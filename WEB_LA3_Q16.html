<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Overlap Gallery</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        
        .gallery-container {
            position: relative;
            height: 300px;
        }

        .gallery-item {
            position: absolute;
            width: 200px;
            height: 150px;
            border: 2px solid black;
            cursor: pointer;
            text-align: center;
            line-height: 150px;
            font-weight: bold;
        }

        
        #img1 { top: 20px; left: 20px; background-color: lightcoral; }
        #img2 { top: 50px; left: 60px; background-color: lightgreen; }
        #img3 { top: 80px; left: 100px; background-color: lightskyblue; }
    </style>
    <script>
        var topZ = 1;

        function bringToFront(element) {
            element.style.zIndex = ++topZ;
        }
    </script>
</head>
<body>

    <h3>Click an image to bring it to the front:</h3>

    <div class="gallery-container">
        <div id="img1" class="gallery-item" onclick="bringToFront(this)">Image 1</div>
        <div id="img2" class="gallery-item" onclick="bringToFront(this)">Image 2</div>
        <div id="img3" class="gallery-item" onclick="bringToFront(this)">Image 3</div>
    </div>

    <p>MAYUR R KENI 24BCE0686</p>
</body>
</html>
