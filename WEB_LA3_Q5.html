<!DOCTYPE html>
<html>
<body>
    <div class="calculator">
        <h2>Simple Calculator</h2>
        <input type="number" id="num1" step="any" placeholder="Number 1">
        <input type="number" id="num2" step="any" placeholder="Number 2"><br><br>
        
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>
        
        <p id="calcResult">Result: </p>
    </div>

    <script>
    function calculate(operator) {
        var n1 = document.getElementById("num1").value;
        var n2 = document.getElementById("num2").value;
        var result;

        var num1 = parseFloat(n1);
        var num2 = parseFloat(n2);

        switch (operator) {
            case '+':
                result = num1 + num2;
                break;
            case '-':
                result = num1 - num2;
                break;
            case '*':
                result = num1 * num2;
                break;
            case '/':
                if (num2 === 0) {
                    result = "Error: Division by zero";
                } else {
                    result = num1 / num2;
                }
                break;
            default:
                result = "Invalid Operation";
        }

        document.getElementById("calcResult").innerHTML = "Result: " + result;
    }
    </script>
</body>
</html>
